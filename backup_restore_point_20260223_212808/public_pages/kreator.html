<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Kolekcji - System Zarządzania Winami</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Design System Styles -->
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/modern-admin.css">
    <link rel="stylesheet" href="css/components.css">
    
    <!-- Wizard Styles -->
    <link rel="stylesheet" href="css/wizard.css">
    
    <script src="/js/navigation-loader.js" defer></script>
    
    <style>
        .modern-main {
            padding: var(--ds-space-6, 1.5rem);
        }
        
        .kreator-header {
            background: linear-gradient(135deg, var(--ds-color-primary) 0%, var(--ds-color-primary-dark) 100%);
            border-radius: var(--ds-radius-xl, 1rem);
            color: white;
            padding: var(--ds-space-8, 2rem);
            margin-bottom: var(--ds-space-6, 1.5rem);
            box-shadow: var(--ds-shadow-lg);
        }
        
        .kreator-header h1 {
            font-size: var(--ds-font-size-3xl, 1.875rem);
            font-weight: var(--ds-font-weight-bold, 700);
            margin-bottom: var(--ds-space-2, 0.5rem);
            display: flex;
            align-items: center;
            gap: var(--ds-space-3, 0.75rem);
        }
        
        .kreator-header p {
            opacity: 0.95;
            margin-bottom: 0;
            font-size: var(--ds-font-size-base, 0.9375rem);
        }
        
        .quick-actions {
            display: flex;
            gap: var(--ds-space-4, 1rem);
            margin-bottom: var(--ds-space-6, 1.5rem);
            flex-wrap: wrap;
        }
        
        .quick-action-btn {
            padding: var(--ds-space-3, 0.75rem) var(--ds-space-5, 1.25rem);
            background: white;
            border: 2px solid var(--ds-color-neutral-300, #e2e8f0);
            border-radius: var(--ds-radius-lg, 0.75rem);
            cursor: pointer;
            transition: all 0.2s ease-out;
            display: flex;
            align-items: center;
            gap: var(--ds-space-2, 0.5rem);
            text-decoration: none;
            color: var(--ds-color-neutral-900, #1a202c);
        }
        
        .quick-action-btn:hover {
            border-color: var(--ds-color-primary, #009634);
            background: var(--ds-color-primary-bg, #f0fdf4);
            transform: translateY(-2px);
            box-shadow: var(--ds-shadow-md);
        }
    </style>
</head>
<body class="modern-admin-wrapper">
    <!-- Navigation Component -->
    <div id="navigation-placeholder"></div>

    <!-- Main Content -->
    <div class="modern-main">
        <div class="modern-container">
            <!-- Header -->
            <div class="kreator-header animate-in">
                <h1>
                    <i class="bi bi-magic"></i>
                    Kreator Kolekcji PDF
                </h1>
                <p>
                    Krok po kroku utwórz profesjonalny katalog win w formacie PDF.
                    Wybierz szablon, dodaj wina i wygeneruj gotowy dokument.
                </p>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button type="button" class="quick-action-btn" onclick="resetWizard()">
                    <i class="bi bi-arrow-clockwise"></i>
                    Resetuj kreator
                </button>
                <a href="collections.html" class="quick-action-btn">
                    <i class="bi bi-folder"></i>
                    Przejdź do kolekcji
                </a>
                <a href="wines.html" class="quick-action-btn">
                    <i class="bi bi-bottle"></i>
                    Zarządzaj winami
                </a>
            </div>
            
            <!-- Wizard Container -->
            <div id="wizard-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- API & Utils -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- Collection Fields Config (needed for dynamic fields) -->
    <script src="js/config/collection-fields.js"></script>
    
    <!-- Wizard Core -->
    <script src="js/components/wizard.js"></script>
    
    <!-- Wizard Configuration -->
    <script src="js/config/collection-wizard-config.js"></script>
    
    <!-- Kreator App -->
    <script>
        // Initialize wizard when DOM is ready
        document.addEventListener('DOMContentLoaded', async function() {
            // Clean up old localStorage keys from previous versions
            try {
                localStorage.removeItem('collection-wizard-state');
                localStorage.removeItem('wizard-state');
                localStorage.removeItem('null'); // In case persistKey was null before fix
            } catch (e) {
                console.warn('Could not clean up old localStorage:', e);
            }
            
            // Pre-initialize CollectionFieldsConfig to avoid re-rendering issues
            // ALWAYS ensure config is loaded before wizard initialization
            if (!window.collectionFieldsConfig) {
                window.collectionFieldsConfig = new CollectionFieldsConfig();
            }
            // Always call init() to ensure data is loaded (init() is idempotent)
            if (!window.collectionFieldsConfig.isLoaded) {
                await window.collectionFieldsConfig.init();
            }
            
            // Check if we're in edit mode
            const urlParams = new URLSearchParams(window.location.search);
            const editCollectionId = urlParams.get('edit');
            let isEditMode = false;
            let existingCollection = null;
            
            // Load existing collection data if in edit mode
            if (editCollectionId) {
                console.log('📝 Edit mode detected, loading collection:', editCollectionId);
                try {
                    const response = await fetch(`/api/collections/${editCollectionId}?includeWines=true`);
                    const result = await response.json();
                    
                    if (result.success && result.data) {
                        isEditMode = true;
                        existingCollection = result.data;
                        console.log('✅ Collection loaded:', existingCollection);
                        
                        // Update page title
                        document.querySelector('.kreator-header h1').innerHTML = `
                            <i class="bi bi-magic"></i>
                            Edycja Kolekcji: ${existingCollection.name}
                        `;
                        document.querySelector('.kreator-header p').textContent = 
                            'Edytuj kolekcję i zapisz zmiany.';
                    } else {
                        alert('❌ Nie znaleziono kolekcji do edycji');
                        window.location.href = 'collections.html';
                        return;
                    }
                } catch (error) {
                    console.error('Error loading collection:', error);
                    alert('❌ Błąd podczas ładowania kolekcji: ' + error.message);
                    window.location.href = 'collections.html';
                    return;
                }
            }
            
            // Create wizard instance
            window.collectionWizard = new Wizard({
                containerId: 'wizard-container',
                steps: collectionWizardSteps,
                persistKey: null, // Don't use localStorage - draft saved to backend instead
                autoSave: false, // Don't auto-save - use explicit "Save Draft" button
                saveDraftButtonText: 'Zapisz roboczą',
                
                // On step change
                onChange: (stepIndex, step, data) => {
                    console.log('Step changed:', step.id, data);
                },
                
                // On save draft
                onSaveDraft: async (data, wizard) => {
                    console.log('Saving draft with data:', data);
                    
                    try {
                        // Show loading state
                        const saveBtn = document.getElementById('wizard-btn-save');
                        if (saveBtn) {
                            saveBtn.disabled = true;
                            saveBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Zapisywanie...';
                        }
                        
                        // Prepare collection data with draft status
                        const collectionData = {
                            name: data.collectionName || 'Nienazwana kolekcja (robocza)',
                            description: `Kolekcja robocza utworzona przez kreator`,
                            status: 'draft',
                            coverImage: data.coverImagePath || data.coverUrl || null,
                            wines: (data.selectedWines || []).map(wine => wine.catalogNumber),
                            dynamicFields: data.collectionFields || {}, // Add custom collection fields
                            metadata: {
                                templateId: data.templateId || null,
                                wineDetails: data.wineDetails || {},
                                categoryNames: data.categoryNames || {},
                                wizardData: {
                                    coverImagePath: data.coverImagePath || null,
                                    coverImageFilename: data.coverImageFilename || null,
                                    coverUrl: data.coverUrl || null,
                                    collectionFields: data.collectionFields || {},
                                    categoryNames: data.categoryNames || {}
                                }
                            }
                        };
                        
                        console.log('Sending draft collection data:', collectionData);
                        
                        // Create or update draft collection
                        let response;
                        const collectionIdToUpdate = isEditMode ? editCollectionId : data._draftCollectionId;
                        
                        if (collectionIdToUpdate) {
                            // Update existing draft or collection
                            response = await fetch(`/api/collections/${collectionIdToUpdate}`, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(collectionData)
                            });
                        } else {
                            // Create new draft
                            response = await fetch('/api/collections', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(collectionData)
                            });
                        }
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.message || 'Błąd podczas zapisywania kolekcji roboczej');
                        }
                        
                        const result = await response.json();
                        console.log('Draft collection saved:', result);
                        
                        // Store collection ID for future updates
                        data._draftCollectionId = result.data?.id || result.id;
                        wizard.saveState();
                        
                        // Show success message
                        alert('✅ Kolekcja robocza została zapisana!\n\nMożesz ją znaleźć na stronie Kolekcje i dokończyć później.');
                        
                        // Redirect to collections page
                        window.location.href = 'collections.html';
                        
                    } catch (error) {
                        console.error('Error saving draft:', error);
                        alert('❌ Błąd podczas zapisywania roboczej:\n' + error.message);
                        
                        // Re-enable button
                        const saveBtn = document.getElementById('wizard-btn-save');
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.innerHTML = '<i class="bi bi-save"></i> Zapisz roboczą';
                        }
                    }
                },
                
                // On completion
                onComplete: async (data, wizard) => {
                    console.log('🎉 Wizard completed with data:', data);
                    console.log('📋 Current wizard.data object:', wizard.data);
                    console.log('🖼️ Cover image data:', {
                        coverImagePath: data.coverImagePath,
                        coverUrl: data.coverUrl,
                        coverImageFilename: data.coverImageFilename,
                        uploadedCover: data.uploadedCover
                    });
                    
                    try {
                        // Show loading state
                        const completeBtn = document.getElementById('wizard-btn-complete');
                        if (completeBtn) {
                            completeBtn.disabled = true;
                            completeBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Generowanie...';
                        }
                        
                        // ✅ Use wine categories map from wizard data (tracks wines moved between sections in step 4)
                        // Do NOT create from wine.category as that's always the original category
                        const wineCategories = data.wineCategories || {};
                        
                        // Prepare collection data
                        const collectionData = {
                            name: data.collectionName,
                            description: `Kolekcja utworzona przez kreator`,
                            status: 'active',
                            coverImage: data.coverImagePath || data.coverUrl,
                            wines: (data.selectedWines || []).map(wine => wine.catalogNumber),
                            dynamicFields: data.collectionFields || {}, // Add custom collection fields
                            metadata: {
                                templateId: data.templateId || null,
                                wineDetails: data.wineDetails || {},
                                categoryNames: data.categoryNames || {},
                                wineCategories: wineCategories, // 💾 Save custom wine categories
                                wizardData: {
                                    coverImagePath: data.coverImagePath || null,
                                    coverImageFilename: data.coverImageFilename || null,
                                    coverUrl: data.coverUrl || null,
                                    collectionFields: data.collectionFields || {},
                                    categoryNames: data.categoryNames || {}
                                }
                            }
                        };
                        
                        console.log('📤 Sending collection data:', JSON.stringify(collectionData, null, 2));
                        console.log('🔑 Template ID being sent:', collectionData.metadata.templateId);
                        console.log('💾 Wine categories being saved:', wineCategories);
                        console.log('📋 Wines order:', collectionData.wines);
                        
                        // Create or update collection
                        let response;
                        const collectionIdToUpdate = isEditMode ? editCollectionId : data._draftCollectionId;
                        
                        if (collectionIdToUpdate) {
                            // Update existing draft/collection to active
                            response = await fetch(`/api/collections/${collectionIdToUpdate}`, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(collectionData)
                            });
                        } else {
                            // Create new active collection
                            response = await fetch('/api/collections', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(collectionData)
                            });
                        }
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.message || 'Błąd podczas tworzenia kolekcji');
                        }
                        
                        const result = await response.json();
                        console.log('✅ Server response:', result);
                        console.log('📋 Saved collection metadata:', result.data?.metadata);
                        console.log('🔑 Saved templateId:', result.data?.metadata?.templateId);
                        
                        // Clear wizard state
                        wizard.clearState();
                        
                        // Show success message
                        const successMessage = isEditMode 
                            ? '✅ Kolekcja została zaktualizowana pomyślnie!\n\nMożesz teraz wygenerować PDF w sekcji Kolekcje.'
                            : '✅ Kolekcja została utworzona pomyślnie!\n\nMożesz teraz wygenerować PDF w sekcji Kolekcje.';
                        alert(successMessage);
                        
                        // Redirect to collections page
                        window.location.href = 'collections.html';
                        
                    } catch (error) {
                        console.error('Error creating collection:', error);
                        alert('❌ Błąd podczas tworzenia kolekcji:\n' + error.message);
                        
                        // Re-enable button
                        const completeBtn = document.getElementById('wizard-btn-complete');
                        if (completeBtn) {
                            completeBtn.disabled = false;
                            completeBtn.innerHTML = '<i class="bi bi-check-circle"></i> Generuj PDF';
                        }
                    }
                }
            });
            
            // Load existing collection data into wizard if in edit mode
            if (isEditMode && existingCollection) {
                console.log('📥 Loading collection data into wizard...');
                console.log('Existing collection:', existingCollection);
                console.log('🔑 Dynamic Fields from server:', existingCollection.dynamicFields);
                
                // Map collection data to wizard format
                const wizardData = {
                    collectionName: existingCollection.name,
                    templateId: existingCollection.metadata?.templateId || null,
                    templateName: null, // Will be loaded from API
                    coverUrl: existingCollection.coverImage || null,
                    coverImagePath: existingCollection.metadata?.wizardData?.coverImagePath || existingCollection.coverImage || null,
                    coverImageFilename: existingCollection.metadata?.wizardData?.coverImageFilename || null,
                    uploadedCover: existingCollection.metadata?.wizardData?.coverImagePath ? {
                        serverPath: existingCollection.metadata.wizardData.coverImagePath,
                        filename: existingCollection.metadata.wizardData.coverImageFilename
                    } : null,
                    selectedWines: existingCollection.wines ? existingCollection.wines.map(wine => {
                        // ✅ DO NOT override wine.category - keep original category from database
                        // Custom category from wineCategories is only for section grouping in step 4
                        
                        return {
                            catalogNumber: wine.catalogNumber,
                            name: wine.name,
                            producer: wine.producer,
                            category: wine.category,  // ✅ Always use original category from wine data
                            image: wine.image || wine.imageUrl,
                            imageUrl: wine.imageUrl || wine.image,
                            type: wine.type,
                            region: wine.region,
                            vintage: wine.vintage,
                            alcohol: wine.alcohol,
                            price: wine.price,
                            price1: wine.price1,  // ✅ Include price1 for default value in step 4
                            price2: wine.price2,  // ✅ Include price2 for completeness
                            poj: wine.poj,        // ✅ Include poj (pojemność) for default value in step 4
                            description: wine.description
                        };
                    }) : [],
                    wineDetails: existingCollection.metadata?.wineDetails || {},
                    collectionFields: existingCollection.dynamicFields || {}, // Load custom collection fields
                    categoryNames: existingCollection.metadata?.categoryNames || existingCollection.metadata?.wizardData?.categoryNames || {},
                    wineCategories: existingCollection.metadata?.wineCategories || {} // ✅ Load saved wine category assignments (when wines were moved between sections)
                };
                
                console.log('Wizard data prepared:', wizardData);
                console.log('Selected wines count:', wizardData.selectedWines.length);
                console.log('� Wine categories from metadata:', existingCollection.metadata?.wineCategories);
                console.log('📋 Selected wines with categories:', wizardData.selectedWines.map(w => ({ 
                    catalogNumber: w.catalogNumber,
                    name: w.name, 
                    category: w.category,
                    customCategory: existingCollection.metadata?.wineCategories?.[w.catalogNumber]
                })));
                console.log('📋 Collection Fields mapped to wizard:', wizardData.collectionFields);
                
                // Set wizard data
                window.collectionWizard.setData(wizardData);
                
                // Mark all steps as completed so user can navigate freely
                window.collectionWizard.completedSteps.add(0);
                window.collectionWizard.completedSteps.add(1);
                window.collectionWizard.completedSteps.add(2);
                window.collectionWizard.completedSteps.add(3);
                window.collectionWizard.completedSteps.add(4);
                
                // Force re-render current step to show loaded data
                window.collectionWizard.showStep(window.collectionWizard.currentStepIndex);
                
                console.log('✅ Collection data loaded into wizard');
            }
            
            console.log('✅ Collection Wizard initialized');
            
            // Update button text if in edit mode
            if (isEditMode) {
                const resetButton = document.querySelector('.quick-action-btn[onclick="resetWizard()"]');
                if (resetButton) {
                    resetButton.innerHTML = '<i class="bi bi-arrow-left"></i> Anuluj edycję';
                }
            }
        });
        
        // Reset wizard function
        function resetWizard() {
            const urlParams = new URLSearchParams(window.location.search);
            const isEditing = urlParams.has('edit');
            
            if (isEditing) {
                if (confirm('Czy na pewno chcesz anulować edycję? Niezapisane zmiany zostaną utracone.')) {
                    window.location.href = 'collections.html';
                }
            } else {
                if (confirm('Czy na pewno chcesz zresetować kreator? Wszystkie wprowadzone dane zostaną usunięte.')) {
                    if (window.collectionWizard) {
                        window.collectionWizard.reset();
                        console.log('Wizard reset');
                    } else {
                        location.reload();
                    }
                }
            }
        }
        
        // Save wizard state before leaving
        window.addEventListener('beforeunload', function(e) {
            if (window.collectionWizard && Object.keys(window.collectionWizard.data).length > 0) {
                // Wizard will auto-save via autoSave: true
                // But we can also show a warning if user has unsaved progress
                const currentStep = window.collectionWizard.currentStepIndex;
                const totalSteps = window.collectionWizard.steps.length;
                
                if (currentStep < totalSteps - 1 && currentStep > 0) {
                    e.preventDefault();
                    e.returnValue = 'Masz niezakończony kreator. Czy na pewno chcesz opuścić tę stronę?';
                }
            }
        });
    </script>
    
    <!-- Theme Loader -->
    <script src="js/theme-loader.js"></script>
</body>
</html>
