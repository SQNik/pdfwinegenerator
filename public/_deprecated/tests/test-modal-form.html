<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Test Modalnego Formularza</h2>
        
        <button type="button" class="btn btn-primary" onclick="testFormGeneration()">
            Test Generowania Formularza
        </button>
        
        <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#wineModal">
            Otwórz Modal Wina
        </button>
        
        <div class="row mt-4">
            <div class="col-12">
                <h4>Aktualna konfiguracja kategorii:</h4>
                <pre id="categoryConfig"></pre>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h4>Wygenerowany formularz:</h4>
                <div id="testFormContainer"></div>
            </div>
        </div>
    </div>

    <!-- Wine Form Modal (kopiowane z wines.html) -->
    <div class="modal fade" id="wineModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="wineModalTitle">Test Modal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="wineForm">
                    <div class="modal-body">
                        <div id="wineFormFields">
                            <!-- Dynamic form fields will be generated here -->
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                        <button type="submit" class="btn btn-primary" id="saveWineBtn">
                            Zapisz
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config/wine-fields.js"></script>

    <script>
        let fieldsConfig = null;

        async function loadFieldsConfig() {
            try {
                const response = await api.getFieldsConfig();
                if (response.success && response.data) {
                    fieldsConfig = response.data;
                    console.log('Loaded fields config:', fieldsConfig);
                    
                    const categoryField = fieldsConfig.find(f => f.key === 'category');
                    document.getElementById('categoryConfig').textContent = JSON.stringify(categoryField, null, 2);
                    
                    return fieldsConfig;
                } else {
                    console.error('Failed to load fields config');
                    return [];
                }
            } catch (error) {
                console.error('Error loading fields config:', error);
                return [];
            }
        }

        function testFormGeneration() {
            if (!fieldsConfig) {
                alert('Najpierw załaduj konfigurację pól!');
                return;
            }

            const formContainer = document.getElementById('testFormContainer');
            const formFields = fieldsConfig.filter(f => f.displayInForm);
            
            console.log('Generating form with fields:', formFields.map(f => f.key));
            
            let formHTML = '<div class="row">';
            
            formFields.forEach(field => {
                const fieldHTML = generateFormField(field);
                formHTML += '<div class="col-12 mb-3">' + fieldHTML + '</div>';
            });
            
            formHTML += '</div>';
            
            formContainer.innerHTML = formHTML;
            console.log('Form generated successfully');
        }

        function generateModalForm() {
            if (!fieldsConfig) return;
            
            const modalFormContainer = document.getElementById('wineFormFields');
            const formFields = fieldsConfig.filter(f => f.displayInForm);
            
            console.log('Generating modal form with fields:', formFields.map(f => f.key));
            
            const groupedFields = {
                basic: formFields.filter(f => f.group === 'basic'),
                details: formFields.filter(f => f.group === 'details'),
                technical: formFields.filter(f => f.group === 'technical')
            };

            let formHTML = '<div class="row">';
            
            // First column - Basic fields
            formHTML += '<div class="col-md-6">';
            groupedFields.basic.forEach(field => {
                formHTML += generateFormField(field);
            });
            formHTML += '</div>';
            
            // Second column - Details and Technical fields
            formHTML += '<div class="col-md-6">';
            groupedFields.details.forEach(field => {
                formHTML += generateFormField(field);
            });
            groupedFields.technical.forEach(field => {
                formHTML += generateFormField(field);
            });
            formHTML += '</div>';
            
            formHTML += '</div>';
            
            modalFormContainer.innerHTML = formHTML;
            console.log('Modal form generated successfully');
        }

        // Event listener for modal show
        document.getElementById('wineModal').addEventListener('show.bs.modal', function (e) {
            console.log('Modal is about to show - generating form');
            generateModalForm();
        });

        // Load config on page load
        document.addEventListener('DOMContentLoaded', loadFieldsConfig);
    </script>
</body>
</html>
