<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pól Kolekcji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1>Test Zarządzania Dynamicznymi Polami Kolekcji</h1>
                <div class="card">
                    <div class="card-body">
                        <h5>API Tests</h5>
                        <div class="d-flex gap-2 mb-3">
                            <button class="btn btn-primary" onclick="testGetFields()">Pobierz Pola</button>
                            <button class="btn btn-success" onclick="testAddField()">Dodaj Pole</button>
                            <button class="btn btn-info" onclick="testUpdateField()">Aktualizuj Pole</button>
                            <button class="btn btn-danger" onclick="testDeleteField()">Usuń Pole</button>
                        </div>
                        <div id="apiResults" class="border p-3 bg-white">
                            <em>Wyniki testów API będą tutaj...</em>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-body">
                        <h5>UI Component Test</h5>
                        <button class="btn btn-primary" onclick="showFieldsManager()">
                            <i class="bi bi-gear"></i> Otwórz Manager Pól
                        </button>
                        <div id="fieldsManagerContainer" class="mt-3">
                            <!-- CollectionFieldsManager will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Collection Fields Management Modal -->
    <div class="modal fade" id="testFieldsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Test Zarządzania Polami</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="testFieldsManagerContainer">
                        <!-- CollectionFieldsManager content -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Collection Field Edit Modal -->
    <div class="modal fade" id="testFieldEditModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="testFieldEditModalTitle">Edycja Pola</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="testFieldEditForm">
                        <!-- Form content will be populated by CollectionFieldsManager -->
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="btn btn-primary" id="saveTestFieldEditBtn">
                        <i class="bi bi-check-lg"></i> Zapisz Pole
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/config/collection-fields.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components/CollectionFieldsManager.js"></script>
    
    <script>
        let collectionFieldsConfig;
        let collectionFieldsManager;

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize collection fields configuration
            collectionFieldsConfig = new CollectionFieldsConfig();
            collectionFieldsManager = new CollectionFieldsManager();
            
            collectionFieldsConfig.init().then(() => {
                console.log('Collection fields configuration initialized');
                logToResults('System initialized successfully');
            }).catch(error => {
                console.error('Failed to initialize collection fields:', error);
                logToResults('System initialization failed: ' + error.message, 'error');
            });
        });

        function logToResults(message, type = 'info') {
            const results = document.getElementById('apiResults');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'text-danger' : 'text-success';
            results.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            results.scrollTop = results.scrollHeight;
        }

        async function testGetFields() {
            try {
                logToResults('Testing GET /api/collection-fields/config...');
                const response = await fetch('/api/collection-fields/config');
                const data = await response.json();
                logToResults('GET Fields Result: ' + JSON.stringify(data, null, 2));
            } catch (error) {
                logToResults('GET Fields Error: ' + error.message, 'error');
            }
        }

        async function testAddField() {
            try {
                logToResults('Testing POST /api/collection-fields/config...');
                const testField = {
                    name: 'Test Field ' + Date.now(),
                    type: 'text',
                    required: false,
                    defaultValue: 'Test default'
                };
                
                const response = await fetch('/api/collection-fields/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testField)
                });
                
                const data = await response.json();
                logToResults('POST Field Result: ' + JSON.stringify(data, null, 2));
            } catch (error) {
                logToResults('POST Field Error: ' + error.message, 'error');
            }
        }

        async function testUpdateField() {
            try {
                // First get fields to find one to update
                const getResponse = await fetch('/api/collection-fields/config');
                const getResult = await getResponse.json();
                
                if (getResult.success && getResult.data && getResult.data.length > 0) {
                    const fieldToUpdate = getResult.data[0];
                    logToResults('Testing PUT /api/collection-fields/config/' + fieldToUpdate.id + '...');
                    
                    fieldToUpdate.name = 'Updated ' + fieldToUpdate.name;
                    
                    const response = await fetch('/api/collection-fields/config/' + fieldToUpdate.id, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(fieldToUpdate)
                    });
                    
                    const data = await response.json();
                    logToResults('PUT Field Result: ' + JSON.stringify(data, null, 2));
                } else {
                    logToResults('No fields available to update', 'error');
                }
            } catch (error) {
                logToResults('PUT Field Error: ' + error.message, 'error');
            }
        }

        async function testDeleteField() {
            try {
                // First get fields to find one to delete
                const getResponse = await fetch('/api/collection-fields/config');
                const getResult = await getResponse.json();
                
                if (getResult.success && getResult.data && getResult.data.length > 0) {
                    // Find a test field to delete (one with "Test" in name)
                    const testField = getResult.data.find(f => f.name.includes('Test'));
                    if (testField) {
                        logToResults('Testing DELETE /api/collection-fields/config/' + testField.id + '...');
                        
                        const response = await fetch('/api/collection-fields/config/' + testField.id, {
                            method: 'DELETE'
                        });
                        
                        const data = await response.json();
                        logToResults('DELETE Field Result: ' + JSON.stringify(data, null, 2));
                    } else {
                        logToResults('No test fields available to delete', 'error');
                    }
                } else {
                    logToResults('No fields available to delete', 'error');
                }
            } catch (error) {
                logToResults('DELETE Field Error: ' + error.message, 'error');
            }
        }

        function showFieldsManager() {
            collectionFieldsManager.init('#testFieldsManagerContainer', '#testFieldsModal', '#testFieldEditModal');
            const modal = new bootstrap.Modal(document.getElementById('testFieldsModal'));
            modal.show();
        }
    </script>
</body>
</html>
