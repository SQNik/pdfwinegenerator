<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Category Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Test Formularza Kategorii</h2>
        
        <div class="row">
            <div class="col-md-6">
                <h4>Aktualna konfiguracja pola category:</h4>
                <pre id="categoryConfig"></pre>
            </div>
            <div class="col-md-6">
                <h4>Test generowania formularza:</h4>
                <div id="testForm"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config/wine-fields.js"></script>

    <script>
        async function testCategoryForm() {
            try {
                console.log('Testing category form...');
                
                // Test API call
                const response = await api.getFieldsConfig();
                console.log('API Response:', response);
                
                if (response.success && response.data) {
                    const categoryField = response.data.find(f => f.key === 'category');
                    console.log('Category field:', categoryField);
                    
                    document.getElementById('categoryConfig').textContent = JSON.stringify(categoryField, null, 2);
                    
                    if (categoryField) {
                        // Test form generation
                        const formHTML = generateFormField(categoryField);
                        document.getElementById('testForm').innerHTML = formHTML;
                        console.log('Generated form HTML:', formHTML);
                    }
                } else {
                    console.error('No data received from API');
                    document.getElementById('categoryConfig').textContent = 'Error: No data from API';
                }
            } catch (error) {
                console.error('Error testing category form:', error);
                document.getElementById('categoryConfig').textContent = 'Error: ' + error.message;
            }
        }

        // Test when page loads
        document.addEventListener('DOMContentLoaded', testCategoryForm);
    </script>
</body>
</html>
