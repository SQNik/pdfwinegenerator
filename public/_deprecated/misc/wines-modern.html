<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarządzanie Winami - Wine Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Modern Admin Styles -->
    <link rel="stylesheet" href="css/modern-admin.css">
</head>
<body class="modern-admin-wrapper">
    <!-- Modern Header -->
    <header class="modern-header">
        <div class="modern-header-inner">
            <a href="index-modern.html" class="modern-brand">
                <div class="modern-brand-icon">
                    <i class="bi bi-grid-3x3-gap"></i>
                </div>
                <span>Katalog Win</span>
            </a>
            
            <div class="modern-header-actions">
                <button class="modern-btn modern-btn-ghost" data-bs-toggle="modal" data-bs-target="#logoUploadModal" title="Zarządzaj logo">
                    <i class="bi bi-image"></i>
                </button>
                <a href="index-modern.html" class="modern-btn modern-btn-secondary">
                    <i class="bi bi-house"></i>
                    Dashboard
                </a>
                <a href="collections-modern.html" class="modern-btn modern-btn-secondary">
                    <i class="bi bi-folder"></i>
                    Kolekcje
                </a>
                <a href="template-editor-modern.html" class="modern-btn modern-btn-primary">
                    <i class="bi bi-code-square"></i>
                    Edytor
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="modern-main">
        <!-- Page Header -->
        <div class="modern-card" style="margin-bottom: var(--space-lg);">
            <div class="modern-card-body" style="padding: var(--space-lg);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0; color: var(--color-text-primary);">
                            <i class="bi bi-bottle" style="color: var(--color-accent);"></i>
                            Zarządzanie Winami
                        </h1>
                        <p style="margin: 0.5rem 0 0 0; color: var(--color-text-tertiary); font-size: 0.875rem;">
                            Przeglądaj, edytuj i zarządzaj swoją kolekcją win
                        </p>
                    </div>
                    <div style="display: flex; gap: var(--space-sm);">
                        <button type="button" class="modern-btn modern-btn-primary" id="addWineBtn">
                            <i class="bi bi-plus-circle"></i>
                            Dodaj Wino
                        </button>
                        <button type="button" class="modern-btn modern-btn-secondary" id="importWinesBtn">
                            <i class="bi bi-upload"></i>
                            Import
                        </button>
                        <button type="button" class="modern-btn modern-btn-ghost" id="exportWinesBtn">
                            <i class="bi bi-download"></i>
                            Eksport
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and Filters -->
        <div class="modern-card" style="margin-bottom: var(--space-lg);">
            <div class="modern-card-body">
                <div style="display: grid; grid-template-columns: 1fr auto auto auto; gap: var(--space-md); align-items: end;">
                    <div class="modern-form-group" style="margin: 0;">
                        <label class="modern-label">Szukaj</label>
                        <div style="position: relative;">
                            <input type="text" class="modern-input" id="searchWines" placeholder="Szukaj win po nazwie, roku, regionie...">
                            <i class="bi bi-search" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-tertiary);"></i>
                        </div>
                    </div>
                    
                    <button class="modern-btn modern-btn-ghost" type="button" data-bs-toggle="collapse" data-bs-target="#advancedFilters">
                        <i class="bi bi-funnel"></i>
                        Filtry zaawansowane
                    </button>
                    
                    <div id="gridColumnsControl" style="display: none; gap: 4px; background: var(--color-bg-secondary); padding: 4px; border-radius: var(--radius-md); border: 1px solid var(--color-border-light);">
                        <button class="modern-btn modern-btn-ghost modern-btn-icon" id="cols2" title="2 kolumny" style="min-width: 36px; height: 36px; font-size: 0.75rem;">2</button>
                        <button class="modern-btn modern-btn-ghost modern-btn-icon" id="cols3" title="3 kolumny" style="min-width: 36px; height: 36px; font-size: 0.75rem;">3</button>
                        <button class="modern-btn modern-btn-ghost modern-btn-icon active" id="cols4" title="4 kolumny" style="min-width: 36px; height: 36px; font-size: 0.75rem;">4</button>
                        <button class="modern-btn modern-btn-ghost modern-btn-icon" id="cols5" title="5 kolumn" style="min-width: 36px; height: 36px; font-size: 0.75rem;">5</button>
                        <button class="modern-btn modern-btn-ghost modern-btn-icon" id="cols6" title="6 kolumn" style="min-width: 36px; height: 36px; font-size: 0.75rem;">6</button>
                    </div>
                    
                    <div style="display: flex; gap: 4px; background: var(--color-bg-secondary); padding: 4px; border-radius: var(--radius-md); border: 1px solid var(--color-border-light);">
                        <button class="modern-btn modern-btn-ghost modern-btn-icon active" id="tableView" title="Widok tabeli" style="min-width: 36px; height: 36px;">
                            <i class="bi bi-table"></i>
                        </button>
                        <button class="modern-btn modern-btn-ghost modern-btn-icon" id="cardView" title="Widok kart" style="min-width: 36px; height: 36px;">
                            <i class="bi bi-grid-3x3"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Advanced Filters -->
                <div class="collapse mt-3" id="advancedFilters">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-md); padding-top: var(--space-md); border-top: 1px solid var(--color-border-light);">
                        <div class="modern-form-group" style="margin: 0;">
                            <label class="modern-label">Kategoria</label>
                            <select class="modern-select" id="categoryFilter">
                                <option value="">Wszystkie</option>
                            </select>
                        </div>
                        <div class="modern-form-group" style="margin: 0;">
                            <label class="modern-label">Typ</label>
                            <select class="modern-select" id="typeFilter">
                                <option value="">Wszystkie</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: var(--space-sm); margin-top: var(--space-md);">
                        <button class="modern-btn modern-btn-ghost" id="clearFilters">
                            <i class="bi bi-x-circle"></i>
                            Wyczyść filtry
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wines Table -->
        <div class="modern-card" id="table-view">
            <div class="modern-table-container">
                <table class="modern-table" id="winesTable">
                    <thead id="winesTableHead">
                        <tr>
                            <!-- Populated dynamically -->
                        </tr>
                    </thead>
                    <tbody id="winesTableBody">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="modern-card-body" style="border-top: 1px solid var(--color-border-light);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="modern-text-secondary" id="winesResultsInfo">
                        Ładowanie...
                    </div>
                    <div id="wines-pagination" style="display: flex; gap: var(--space-sm);">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Wines Cards View -->
        <div class="d-none" id="card-view">
            <div id="wines-cards-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-lg);">
                <!-- Populated dynamically -->
            </div>
            
            <!-- Pagination for cards -->
            <div class="modern-card mt-3">
                <div class="modern-card-body">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="modern-text-secondary" id="winesResultsInfo">
                            Ładowanie...
                        </div>
                        <div id="wines-pagination" style="display: flex; gap: var(--space-sm);">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wine Fields Management (Moved to bottom) -->
        <div class="modern-card" style="margin-bottom: var(--space-lg); margin-top: var(--space-xl);">
            <div class="modern-card-header">
                <h3 class="modern-card-title">
                    <i class="bi bi-sliders"></i>
                    Zarządzanie Polami Win
                </h3>
                <button class="modern-btn modern-btn-sm modern-btn-ghost" type="button" data-bs-toggle="collapse" data-bs-target="#fieldsSection">
                    <i class="bi bi-chevron-down"></i>
                </button>
            </div>
            <div class="collapse" id="fieldsSection">
                <div class="modern-card-body">
                    <div style="display: flex; gap: var(--space-sm); margin-bottom: var(--space-md);">
                        <button class="modern-btn modern-btn-primary" id="addFieldBtn" data-bs-toggle="modal" data-bs-target="#wineFieldModal">
                            <i class="bi bi-plus-lg"></i> Dodaj Pole
                        </button>
                        <button class="modern-btn modern-btn-ghost" onclick="wineFieldsManager.exportConfiguration()">
                            <i class="bi bi-download"></i> Eksportuj
                        </button>
                        <button class="modern-btn modern-btn-ghost" onclick="wineFieldsManager.resetConfiguration()">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </button>
                    </div>
                    
                    <div class="modern-table-container">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th>Klucz</th>
                                    <th>Etykieta</th>
                                    <th>Typ</th>
                                    <th>Wymagane</th>
                                    <th>Tabela</th>
                                    <th>Formularz</th>
                                    <th>Karty</th>
                                    <th>Grupa</th>
                                    <th>Akcje</th>
                                </tr>
                            </thead>
                            <tbody id="wine-fields-table-body">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Wine Modal -->
    <div class="modal fade" id="wineModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: var(--radius-lg); border: none; box-shadow: var(--shadow-xl);">
                <div class="modal-header" style="border-bottom: 1px solid var(--color-border-light); padding: var(--space-lg);">
                    <h5 class="modal-title" style="font-weight: 600; font-size: 1.25rem;">Dodaj Wino</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="padding: var(--space-lg);">
                    <form id="wineForm">
                        <div id="wineFormFields">
                            <!-- Populated dynamically -->
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--color-border-light); padding: var(--space-lg); gap: var(--space-sm);">
                    <button type="button" class="modern-btn modern-btn-ghost" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="modern-btn modern-btn-primary" id="saveWineBtn">
                        <i class="bi bi-check-circle"></i>
                        Zapisz
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Wine Field Modal -->
    <div class="modal fade" id="wineFieldModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: var(--radius-lg); border: none; box-shadow: var(--shadow-xl);">
                <div class="modal-header" style="border-bottom: 1px solid var(--color-border-light); padding: var(--space-lg);">
                    <h5 class="modal-title" style="font-weight: 600; font-size: 1.25rem;">Konfiguracja Pola</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="padding: var(--space-lg);">
                    <form id="wineFieldForm">
                        <input type="hidden" id="fieldIndex" value="">
                        
                        <div class="modern-form-group">
                            <label class="modern-label">Klucz <span style="color: var(--color-danger);">*</span></label>
                            <input type="text" class="modern-input" id="fieldKey" required>
                            <small class="modern-text-tertiary">Unikalny identyfikator pola (bez spacji)</small>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">Etykieta <span style="color: var(--color-danger);">*</span></label>
                            <input type="text" class="modern-input" id="fieldLabel" required>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">Typ <span style="color: var(--color-danger);">*</span></label>
                            <select class="modern-select" id="fieldType" required>
                                <option value="text">Text</option>
                                <option value="number">Number</option>
                                <option value="textarea">Textarea</option>
                                <option value="select">Select</option>
                                <option value="date">Date</option>
                                <option value="boolean">Boolean</option>
                                <option value="url">URL</option>
                                <option value="email">Email</option>
                            </select>
                        </div>

                        <div class="modern-form-group" id="optionsContainer" style="display: none;">
                            <label class="modern-label">Opcje (jedna na linię)</label>
                            <textarea class="modern-input" id="fieldOptions" rows="4" placeholder="Opcja 1&#10;Opcja 2&#10;Opcja 3"></textarea>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">Grupa</label>
                            <input type="text" class="modern-input" id="fieldGroup" placeholder="np. Podstawowe">
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">Opis</label>
                            <textarea class="modern-input" id="fieldDescription" rows="2"></textarea>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">
                                <input type="checkbox" class="modern-checkbox" id="fieldRequired">
                                <span style="margin-left: var(--space-xs);">Pole wymagane</span>
                            </label>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">
                                <input type="checkbox" class="modern-checkbox" id="showInTable">
                                <span style="margin-left: var(--space-xs);">Pokaż w tabeli</span>
                            </label>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">
                                <input type="checkbox" class="modern-checkbox" id="showInForm">
                                <span style="margin-left: var(--space-xs);">Pokaż w formularzu</span>
                            </label>
                        </div>

                        <div class="modern-form-group">
                            <label class="modern-label">
                                <input type="checkbox" class="modern-checkbox" id="showInCards">
                                <span style="margin-left: var(--space-xs);">Pokaż w kartach</span>
                            </label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--color-border-light); padding: var(--space-lg); gap: var(--space-sm);">
                    <button type="button" class="modern-btn modern-btn-ghost" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="modern-btn modern-btn-primary" id="saveFieldBtn">
                        <i class="bi bi-check-circle"></i>
                        Zapisz Pole
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/config.js"></script>
    <script src="js/config/wine-fields.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components/wines.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Initialize logo modal
            BrandingManager.initModal();
            
            // Initialize WineFieldsManager first and make it globally available
            const wineFieldsManager = new WineFieldsManager();
            window.wineFieldsManager = wineFieldsManager;
            
            // Initialize fields configuration before WineManager
            await wineFieldsManager.init();
            
            // Now initialize WineManager (it will find wineFieldsManager)
            const wineManager = new WineManager();
            
            window.wineApp = { 
                currentSection: 'wines', 
                managers: { 
                    wines: wineManager,
                    fields: wineFieldsManager 
                } 
            };
            
            // View toggle is handled by WineManager
        });
    </script>
</body>
</html>
