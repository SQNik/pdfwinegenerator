<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Form Generation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/config/wine-fields.js"></script>
    <script src="js/api.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h1>Debug Form Generation</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Generated Form</h3>
                <form id="testForm">
                    <div id="formContainer">
                        <!-- Form fields will be generated here -->
                    </div>
                    <button type="button" class="btn btn-primary" onclick="testFormData()">Test Form Data</button>
                </form>
            </div>
            <div class="col-md-6">
                <h3>Debug Output</h3>
                <div id="debugOutput"></div>
            </div>
        </div>
    </div>
    
    <script>
        let fieldsConfig = null;
        
        function log(message) {
            console.log(message);
            const output = document.getElementById('debugOutput');
            output.innerHTML += '<p>' + JSON.stringify(message, null, 2) + '</p>';
        }
        
        async function loadFields() {
            try {
                const response = await api.getFieldsConfig();
                if (response.success && response.data) {
                    window.WineFieldsConfig.WINE_FIELDS_CONFIG = response.data;
                    fieldsConfig = window.WineFieldsConfig;
                    log('Fields loaded: ' + response.data.length);
                    generateForm();
                } else {
                    log('Failed to load fields');
                }
            } catch (error) {
                log('Error loading fields: ' + error.message);
            }
        }
        
        function generateForm() {
            if (!fieldsConfig) return;
            
            const formFields = fieldsConfig.getFormFields();
            log('Form fields count: ' + formFields.length);
            log('Form fields: ' + formFields.map(f => f.key + ' (' + f.type + ')'));
            
            const container = document.getElementById('formContainer');
            let html = '';
            
            formFields.forEach(field => {
                html += fieldsConfig.generateFormField(field);
            });
            
            container.innerHTML = html;
            log('Form HTML generated');
        }
        
        function testFormData() {
            if (!fieldsConfig) return;
            
            const formFields = fieldsConfig.getFormFields();
            const formData = {};
            
            log('=== Testing Form Data Collection ===');
            
            formFields.forEach(fieldConfig => {
                const fieldId = `wine${fieldConfig.key.charAt(0).toUpperCase() + fieldConfig.key.slice(1)}`;
                const element = document.getElementById(fieldId);
                
                log('Looking for field: ' + fieldId + ' (config key: ' + fieldConfig.key + ')');
                log('Element found: ' + (element !== null));
                
                if (element) {
                    formData[fieldConfig.key] = element.value;
                    log('Value: "' + element.value + '"');
                } else {
                    log('MISSING ELEMENT!');
                }
            });
            
            log('Final form data: ' + JSON.stringify(formData, null, 2));
        }
        
        document.addEventListener('DOMContentLoaded', loadFields);
    </script>
</body>
</html>
