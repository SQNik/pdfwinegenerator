<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Wine Management</title>
    <script src="js/config.js"></script>
    <script src="js/config/wine-fields.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
</head>
<body>
    <h1>Debug Wine Management</h1>
    <div id="debug-output"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const output = document.getElementById('debug-output');
            
            function log(message) {
                console.log(message);
                output.innerHTML += '<p>' + message + '</p>';
            }
            
            // Test basic loading
            log('=== LOADING TESTS ===');
            log('CONFIG loaded: ' + (typeof CONFIG !== 'undefined'));
            log('window.WineFieldsConfig loaded: ' + (typeof window.WineFieldsConfig !== 'undefined'));
            log('api loaded: ' + (typeof api !== 'undefined'));
            
            if (window.WineFieldsConfig) {
                log('WineFieldsConfig.WINE_FIELDS_CONFIG length: ' + window.WineFieldsConfig.WINE_FIELDS_CONFIG.length);
                log('generateTableRow function exists: ' + (typeof window.WineFieldsConfig.generateTableRow === 'function'));
            }
            
            // Test API
            log('=== API TESTS ===');
            api.getWines().then(response => {
                log('API getWines success: ' + response.success);
                if (response.success) {
                    log('Wines count: ' + (response.data ? response.data.length : 0));
                }
            }).catch(error => {
                log('API getWines error: ' + error.message);
            });
            
            api.getFieldsConfig().then(response => {
                log('API getFieldsConfig success: ' + response.success);
                if (response.success) {
                    log('Fields count: ' + (response.data ? response.data.length : 0));
                }
            }).catch(error => {
                log('API getFieldsConfig error: ' + error.message);
            });
        });
    </script>
</body>
</html>
