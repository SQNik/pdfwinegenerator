<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnoza Błędów API</title>
</head>
<body>
    <h1>Diagnoza Błędów Collection Fields API</h1>
    <div id="results"></div>
    
    <script>
        console.log('=== DIAGNOZA START ===');
        
        // Test 1: Sprawdź czy fetch jest dostępne
        console.log('1. Fetch API:', typeof fetch !== 'undefined' ? 'OK' : 'BRAK');
        
        // Test 2: Sprawdź bazowe API
        console.log('2. Testowanie bazowego API endpoint...');
        fetch('/api/collection-fields/config')
            .then(response => {
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                document.getElementById('results').innerHTML = 
                    '<p style="color: green;">✅ API działa! Data: ' + JSON.stringify(data, null, 2) + '</p>';
            })
            .catch(error => {
                console.error('API Error:', error);
                document.getElementById('results').innerHTML = 
                    '<p style="color: red;">❌ API błąd: ' + error.message + '</p>';
            });
        
        console.log('=== DIAGNOZA END ===');
    </script>
</body>
</html>
