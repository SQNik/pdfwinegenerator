<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Custom CSS - Wine Management System</title>
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/modern-admin.css">
    <link rel="stylesheet" href="css/components.css">
    
    <!-- Theme Loader - ładuje custom CSS -->
    <script src="/js/theme-loader.js"></script>
    <script src="/js/navigation-loader.js" defer></script>
    
    <style>
        body {
            padding: 2rem;
        }
        .test-box {
            padding: 2rem;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .nav-item {
            padding: 0.5rem 1rem;
            background: #009634;
            color: white;
            display: inline-block;
            margin: 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Navigation Component -->
    <div id="navigation-placeholder"></div>

    <h1>🧪 Test Custom CSS</h1>
    
    <div class="test-box">
        <h2>Status Custom CSS:</h2>
        <p id="cssStatus">Sprawdzam...</p>
    </div>
    
    <div class="test-box">
        <h2>Test elementów .nav-item</h2>
        <p>Te elementy powinny być UKRYTE jeśli Custom CSS działa (display: none):</p>
        <div class="nav-item">Element 1 - Powinien być ukryty</div>
        <div class="nav-item">Element 2 - Powinien być ukryty</div>
        <div class="nav-item">Element 3 - Powinien być ukryty</div>
    </div>
    
    <div class="test-box">
        <h2>Aktualne ustawienia z API:</h2>
        <pre id="settingsData" style="background: white; padding: 1rem; border-radius: 4px; overflow: auto;"></pre>
    </div>

    <script>
        // Sprawdź czy custom CSS jest załadowany
        async function checkCustomCSS() {
            try {
                // Sprawdź czy style tag istnieje
                const customStyle = document.getElementById('custom-user-css');
                const statusEl = document.getElementById('cssStatus');
                
                if (customStyle) {
                    statusEl.innerHTML = `
                        ✅ <strong>Custom CSS jest załadowany!</strong><br>
                        <code>${customStyle.textContent}</code>
                    `;
                    statusEl.style.background = '#d4edda';
                    statusEl.style.color = '#155724';
                    statusEl.style.padding = '1rem';
                    statusEl.style.borderRadius = '4px';
                } else {
                    statusEl.innerHTML = '❌ <strong>Custom CSS NIE jest załadowany</strong>';
                    statusEl.style.background = '#f8d7da';
                    statusEl.style.color = '#721c24';
                    statusEl.style.padding = '1rem';
                    statusEl.style.borderRadius = '4px';
                }
                
                // Pobierz dane z API
                const response = await fetch('/api/settings/appearance');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('settingsData').textContent = JSON.stringify(result.data, null, 2);
                } else {
                    document.getElementById('settingsData').textContent = 'Błąd: ' + result.message;
                }
                
            } catch (error) {
                document.getElementById('cssStatus').innerHTML = '❌ Błąd: ' + error.message;
                document.getElementById('cssStatus').style.background = '#f8d7da';
                document.getElementById('cssStatus').style.padding = '1rem';
            }
        }
        
        // Czekaj aż theme-loader zakończy pracę
        setTimeout(checkCustomCSS, 1000);
    </script>
</body>
</html>
