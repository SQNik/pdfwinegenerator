<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustawienia Systemu - Katalog Win</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../css/design-tokens.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/modern-admin.css">
    <link rel="stylesheet" href="css/settings.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Navigation Loader -->
    <script src="../js/navigation-loader.js" defer></script>
</head>
<body>
    <!-- Navigation Component -->
    <div id="navigation-placeholder"></div>

    <!-- Main Content -->
    <main class="settings-container">
        <!-- Sidebar Navigation -->
        <aside class="settings-sidebar">
            <div class="settings-nav">
                <h3 class="settings-nav-title">
                    <i class="bi bi-gear"></i> Ustawienia
                </h3>
                
                <nav class="settings-nav-menu">
                    <button class="settings-nav-item active" data-section="appearance">
                        <i class="bi bi-palette"></i>
                        <span>Wygląd</span>
                    </button>
                    
                    <button class="settings-nav-item" data-section="security">
                        <i class="bi bi-shield-lock"></i>
                        <span>Bezpieczeństwo</span>
                    </button>
                    
                    <button class="settings-nav-item" data-section="users">
                        <i class="bi bi-people"></i>
                        <span>Użytkownicy</span>
                    </button>
                    
                    <button class="settings-nav-item" data-section="system">
                        <i class="bi bi-cpu"></i>
                        <span>System</span>
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="settings-content">
            <!-- Dynamic content loaded here -->
            <div id="settings-section-container">
                <div class="loading">
                    <i class="bi bi-hourglass-split"></i>
                    <p>Ładowanie ustawień...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/theme-loader.js"></script>
    <script src="js/utils/settings-api.js"></script>
    <script src="js/components/appearance-settings.js"></script>
    <script src="js/components/security-settings.js"></script>
    <script src="js/components/users-settings.js"></script>
    <script src="js/components/system-settings.js"></script>
    <script src="js/settings-app.js"></script>
</body>
</html>
