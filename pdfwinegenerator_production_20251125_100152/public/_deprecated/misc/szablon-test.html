<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{wine.name}}</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 20px;
background: #f5f5f5;
}

.grid2r1 {
display: grid;
grid-template-columns: repeat(2, 1fr);
grid-template-rows: repeat(1, 1fr);
grid-column-gap: 10px;
grid-row-gap: 10px;
}
.container {
display: flex;
flex-direction: row;
gap: 0px;
width: 100%;
}
.wine-card {
background: white;
border-radius: 10px;
padding: 10px;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
max-width: 600px;
margin: 0 auto;
width: 297.5px; /* Optimal width for wine cards */
height: 115px; /* Fixed height for consistent layout */
overflow: hidden; /* Prevent content overflow */
box-sizing: border-box; /* Include padding in dimensions */
}
.wine-image {
flex: 0 0 65px;
display: flex;
align-items: flex-start;
justify-content: center;
}
.wine-image img {
max-width: 65px;
max-height: 96px;
object-fit: contain; /* Maintain aspect ratio */
border-radius: 5px; /* Subtle rounding */
}
.wine-details {
flex: 1;
display: flex;
flex-direction: column;
justify-content: flex-start;
}
.wine-row {
display: flex;
flex-direction: row;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 6px;
gap: 6px;
width: 100%;
}
.wine-title {
font-size: 14px;
font-weight: bold;
line-height: 1.1;
flex: 1;
margin-right: 6px;
}
.price-block {
display: flex;
flex-direction: column;
gap: 3px;
min-width: 30px;
align-items: flex-end;
}
.product-row-inline {
display: flex;
align-items: center;
gap: 1px;
margin-bottom: 0;
}
.product-label {
font-size: 6px;
font-weight: bold;
display: flex;
align-items: center;
gap: 4px;
}
.product-price {
padding: 3px 3px;
border: 1px solid #111;
border-radius: 8px;
font-size: 8px;
font-weight: bold;
background: #fff;
}
.wine-info {
margin-bottom: 3px;
font-size: 8px;
}
.wine-desc {
margin: 6px 0 0 0;
font-size: 8px;
line-height: 1.35;
}
.wine-vol {
margin-top: 6px;
font-size: 6px;
font-weight: bold;
}
</style>
</head>
<body>
<div class="wines-grid">
<div class="grid2r1">
{{#each winesList}}
<div class="wine-card">
<div class="container">
<div class="wine-image">
<img src="/images/{{this.image}}" alt="{{this.name}}" onerror="this.src='/images/111101.jpg'">
</div>
<div class="wine-details">
<div class="wine-row">
<div class="wine-title">
{{this.name}}
</div>
<div class="price-block">
<div class="product-row-inline">
<div class="product-label">Cena 1</div>
<div class="product-price">{{this.price1}}</div>
</div>
<div class="product-row-inline">
<div class="product-label">Cena 2</div>
<div class="product-price">{{this.price2}}</div>
</div>
</div>
</div>
<div class="wine-info">
<strong>Szczep:</strong> {{this.szczepy}}</div>
<div class="wine-info">
<strong>Region:</strong> {{this.region}}</div>
<div class="wine-info">
<strong>Typ:</strong> {{this.type}}</div>
<div class="wine-desc">
{{this.description}}
</div>
<div class="wine-vol">
{{#if this.poj}}{{this.poj}} | {{/if}}Vol. {{this.alcohol}}
</div>
</div>
</div>
</div>
{{/each}}
</div>
</body>
</html>
