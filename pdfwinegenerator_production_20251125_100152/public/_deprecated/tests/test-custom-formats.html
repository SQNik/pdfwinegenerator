<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Custom Formats Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Test Custom Formats Manager</h1>
        
        <!-- Test Results -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Test Results</h5>
            </div>
            <div class="card-body">
                <div id="testResults" class="test-results">
                    <p class="text-info">Running tests...</p>
                </div>
            </div>
        </div>
        
        <!-- Custom PDF Formats Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Custom PDF Formats</h5>
            </div>
            <div class="card-body">
                <button id="addCustomFormatBtn" class="btn btn-primary mb-3">Add Custom Format</button>
                <div id="customFormatsList" class="custom-formats-list">
                    <!-- Custom formats will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Format Modal -->
    <div class="modal fade" id="customFormatModal" tabindex="-1" aria-labelledby="customFormatModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="customFormatModalLabel">Add Custom Format</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="customFormatForm">
                        <div class="mb-3">
                            <label for="formatName" class="form-label">Format Name</label>
                            <input type="text" class="form-control" id="formatName" required>
                        </div>
                        <div class="mb-3">
                            <label for="formatWidth" class="form-label">Width (mm)</label>
                            <input type="number" class="form-control" id="formatWidth" min="10" max="1000" required>
                        </div>
                        <div class="mb-3">
                            <label for="formatHeight" class="form-label">Height (mm)</label>
                            <input type="number" class="form-control" id="formatHeight" min="10" max="1000" required>
                        </div>
                        <div class="mb-3">
                            <label for="formatOrientation" class="form-label">Orientation</label>
                            <select class="form-control" id="formatOrientation" required>
                                <option value="portrait">Portrait</option>
                                <option value="landscape">Landscape</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveCustomFormatBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteCustomFormatModal" tabindex="-1" aria-labelledby="deleteCustomFormatModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteCustomFormatModalLabel">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this custom format?</p>
                    <p><strong id="deleteFormatName"></strong></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteCustomFormatBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/components/CustomFormatsManager.js"></script>
    
    <script>
        console.log('🚀 Starting Custom Formats Test');
        
        function addTestResult(message, type = 'info') {
            const testResults = document.getElementById('testResults');
            const alertClass = type === 'error' ? 'alert-danger' : type === 'success' ? 'alert-success' : 'alert-info';
            const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : '📋';
            
            const resultElement = document.createElement('div');
            resultElement.className = `alert ${alertClass}`;
            resultElement.innerHTML = `${icon} ${message}`;
            testResults.appendChild(resultElement);
        }
        
        // Test API endpoint directly
        async function testAPIEndpoint() {
            try {
                addTestResult('Testing API endpoint /api/custom-formats...');
                const response = await fetch('/api/custom-formats');
                const data = await response.json();
                
                if (response.ok) {
                    addTestResult(`API endpoint working! Status: ${response.status}`, 'success');
                    addTestResult(`Response data: ${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    addTestResult(`API endpoint failed! Status: ${response.status}, Data: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                addTestResult(`API endpoint error: ${error.message}`, 'error');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            addTestResult('DOM Content Loaded');
            addTestResult(`CustomFormatsManager type: ${typeof CustomFormatsManager}`);
            
            // Test API first
            testAPIEndpoint();
            
            if (typeof CustomFormatsManager !== 'undefined') {
                addTestResult('CustomFormatsManager class found', 'success');
                
                try {
                    const customFormatsManager = new CustomFormatsManager();
                    addTestResult('CustomFormatsManager instance created', 'success');
                    
                    customFormatsManager.init().then(() => {
                        addTestResult('CustomFormatsManager initialized successfully', 'success');
                    }).catch(error => {
                        addTestResult(`CustomFormatsManager initialization failed: ${error.message}`, 'error');
                    });
                } catch (error) {
                    addTestResult(`Failed to create CustomFormatsManager instance: ${error.message}`, 'error');
                }
            } else {
                addTestResult('CustomFormatsManager class not found', 'error');
            }
        });
    </script>
</body>
</html>
