<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CollectionFieldsManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1>Test CollectionFieldsManager</h1>
                <button class="btn btn-primary" id="showManagerBtn">Pokaż Manager Pól</button>
                
                <div class="mt-3">
                    <h5>Status:</h5>
                    <div id="status">Ładowanie...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal zarządzania polami -->
    <div class="modal fade" id="fieldsManagerModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Test Zarządzania Polami</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="fieldsManagerContainer">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Ładowanie...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal edycji pola -->
    <div class="modal fade" id="fieldEditModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edycja Pola</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="fieldEditForm">
                        <!-- Zawartość będzie wygenerowana przez CollectionFieldsManager -->
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="btn btn-primary" id="saveFieldBtn">
                        <i class="bi bi-check-lg"></i> Zapisz Pole
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/config/collection-fields.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components/CollectionFieldsManager.js"></script>
    
    <script>
        let collectionFieldsConfig;
        let collectionFieldsManager;
        let status = document.getElementById('status');

        function updateStatus(message, type = 'info') {
            const className = type === 'error' ? 'text-danger' : 'text-success';
            status.innerHTML = `<span class="${className}">${message}</span>`;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            updateStatus('Inicjalizacja...');
            
            try {
                // 1. Inicjalizuj config
                updateStatus('Inicjalizowanie konfiguracji pól...');
                collectionFieldsConfig = new CollectionFieldsConfig();
                await collectionFieldsConfig.init();
                updateStatus('Config załadowany ✓');

                // 2. Inicjalizuj manager
                updateStatus('Inicjalizowanie managera...');
                collectionFieldsManager = new CollectionFieldsManager();
                collectionFieldsManager.init('#fieldsManagerContainer', '#fieldsManagerModal', '#fieldEditModal');
                
                // Globalna referencja
                window.collectionFieldsManager = collectionFieldsManager;
                window.collectionFieldsConfig = collectionFieldsConfig;
                
                updateStatus('Manager zainicjalizowany ✓');

                // 3. Podłącz przycisk
                document.getElementById('showManagerBtn').addEventListener('click', function() {
                    updateStatus('Otwieranie managera pól...');
                    collectionFieldsManager.show();
                });

                updateStatus('System gotowy do użycia! ✅', 'success');

            } catch (error) {
                updateStatus('Błąd inicjalizacji: ' + error.message, 'error');
                console.error('Initialization error:', error);
            }
        });
    </script>
</body>
</html>
