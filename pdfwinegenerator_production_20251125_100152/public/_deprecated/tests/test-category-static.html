<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Category Form - Static</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Test Formularza Kategorii - Statyczny</h2>
        
        <div class="row">
            <div class="col-md-6">
                <h4>Hardcoded Category Field:</h4>
                <pre id="categoryConfig"></pre>
            </div>
            <div class="col-md-6">
                <h4>Generated Form:</h4>
                <div id="testForm"></div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <h4>Test HTML Generated:</h4>
                <pre id="generatedHTML"></pre>
            </div>
        </div>
    </div>

    <script src="js/config/wine-fields.js"></script>

    <script>
        // Test with hardcoded category field
        const testCategoryField = {
            "key": "category",
            "label": "Kategoria",
            "type": "select",
            "group": "details",
            "placeholder": "",
            "validation": {
                "min": "",
                "max": ""
            },
            "options": [
                "Czerwone",
                "Białe",
                "Różowe",
                "Musujące"
            ],
            "formOrder": 7,
            "tableOrder": 7,
            "displayInTable": true,
            "displayInForm": true,
            "displayInCards": true,
            "required": false,
            "searchable": true,
            "filterable": true
        };

        function testCategoryFormStatic() {
            console.log('Testing static category form...');
            
            // Display field config
            document.getElementById('categoryConfig').textContent = JSON.stringify(testCategoryField, null, 2);
            
            try {
                // Test form generation
                const formHTML = generateFormField(testCategoryField);
                document.getElementById('testForm').innerHTML = formHTML;
                document.getElementById('generatedHTML').textContent = formHTML;
                console.log('Generated form HTML:', formHTML);
                
                console.log('Form generation successful!');
            } catch (error) {
                console.error('Error generating form:', error);
                document.getElementById('testForm').innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
                document.getElementById('generatedHTML').textContent = 'Error: ' + error.message;
            }
        }

        // Test when page loads
        document.addEventListener('DOMContentLoaded', testCategoryFormStatic);
    </script>
</body>
</html>
