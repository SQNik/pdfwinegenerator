<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Fields Config</title>
    <script src="js/config.js"></script>
    <script src="js/config/wine-fields.js"></script>
    <script src="js/api.js"></script>
</head>
<body>
    <h1>Debug Fields Configuration</h1>
    <div id="debug-output"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const output = document.getElementById('debug-output');
            
            function log(message) {
                console.log(message);
                output.innerHTML += '<p>' + message + '</p>';
            }
            
            // Test fields configuration
            log('=== FIELDS CONFIGURATION DEBUG ===');
            log('Initial window.WineFieldsConfig.WINE_FIELDS_CONFIG length: ' + window.WineFieldsConfig.WINE_FIELDS_CONFIG.length);
            
            // Show first few fields
            const initialFields = window.WineFieldsConfig.WINE_FIELDS_CONFIG.slice(0, 3);
            log('Initial fields (first 3): ' + JSON.stringify(initialFields.map(f => ({key: f.key, label: f.label})), null, 2));
            
            // Test API
            try {
                log('--- Testing API ---');
                const response = await api.getFieldsConfig();
                log('API response success: ' + response.success);
                if (response.success && response.data) {
                    log('API fields count: ' + response.data.length);
                    const apiFields = response.data.slice(0, 3);
                    log('API fields (first 3): ' + JSON.stringify(apiFields.map(f => ({key: f.key, label: f.label})), null, 2));
                    
                    // Compare
                    log('--- Comparison ---');
                    log('Same fields? ' + (JSON.stringify(initialFields) === JSON.stringify(apiFields)));
                }
            } catch (error) {
                log('API error: ' + error.message);
            }
            
            // Test getFormFields function
            log('--- getFormFields() test ---');
            const formFields = window.WineFieldsConfig.getFormFields();
            log('getFormFields() count: ' + formFields.length);
            log('Form fields: ' + JSON.stringify(formFields.map(f => ({key: f.key, label: f.label, displayInForm: f.displayInForm})), null, 2));
        });
    </script>
</body>
</html>
