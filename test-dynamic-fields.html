<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dynamicznych Pól</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Test Ładowania Pól Dynamicznych</h2>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <h4>Pola tekstowe:</h4>
                <select class="form-select" id="text-data-binding">
                    <option value="">Brak</option>
                </select>
            </div>
            <div class="col-md-6">
                <h4>Pola obrazów:</h4>
                <select class="form-select" id="image-data-binding">
                    <option value="">Brak</option>
                </select>
            </div>
        </div>
        
        <div class="mt-4">
            <button class="btn btn-primary" onclick="loadDynamicFields()">Załaduj Pola Dynamiczne</button>
            <button class="btn btn-secondary" onclick="showFieldDetails()">Pokaż Szczegóły Pól</button>
        </div>
        
        <div class="mt-4">
            <pre id="debug-output" class="bg-light p-3 rounded"></pre>
        </div>
    </div>

    <script>
        let dynamicFields = [];

        async function loadDynamicFields() {
            try {
                console.log('Loading dynamic fields...');
                const response = await fetch('/api/fields/config');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                if (data.success && data.data) {
                    dynamicFields = data.data;
                    populateDataBindingOptions();
                    document.getElementById('debug-output').textContent = 
                        `Załadowano ${dynamicFields.length} pól dinamicznych:\n` +
                        JSON.stringify(dynamicFields, null, 2);
                } else {
                    console.error('Failed to load dynamic fields:', data.error);
                    document.getElementById('debug-output').textContent = 
                        'Błąd ładowania pól: ' + data.error;
                }
            } catch (error) {
                console.error('Error loading dynamic fields:', error);
                document.getElementById('debug-output').textContent = 
                    'Błąd: ' + error.message;
            }
        }

        function populateDataBindingOptions() {
            console.log('Populating data binding options');
            
            // Populate text data binding options
            const textDataBindingSelect = document.getElementById('text-data-binding');
            if (textDataBindingSelect) {
                // Clear existing options except "Brak"
                textDataBindingSelect.innerHTML = '<option value="">Brak</option>';
                
                // Add dynamic fields as options
                dynamicFields.forEach(field => {
                    // Skip image field for text binding
                    if (field.type !== 'image') {
                        const option = document.createElement('option');
                        option.value = field.key;
                        option.textContent = field.label;
                        textDataBindingSelect.appendChild(option);
                    }
                });
                
                console.log('Text data binding options populated with', 
                    textDataBindingSelect.options.length - 1, 'fields');
            }
            
            // Populate image data binding options
            const imageDataBindingSelect = document.getElementById('image-data-binding');
            if (imageDataBindingSelect) {
                // Clear existing options except "Brak"
                imageDataBindingSelect.innerHTML = '<option value="">Brak</option>';
                
                // Add image fields as options
                dynamicFields.forEach(field => {
                    if (field.type === 'image') {
                        const option = document.createElement('option');
                        option.value = field.key;
                        option.textContent = field.label;
                        imageDataBindingSelect.appendChild(option);
                    }
                });
                
                console.log('Image data binding options populated');
            }
        }

        function showFieldDetails() {
            if (dynamicFields.length === 0) {
                document.getElementById('debug-output').textContent = 
                    'Najpierw załaduj pola dynamiczne!';
                return;
            }

            let output = `Dostępne pola dynamiczne (${dynamicFields.length}):\n\n`;
            
            const textFields = dynamicFields.filter(f => f.type !== 'image');
            const imageFields = dynamicFields.filter(f => f.type === 'image');
            
            output += `Pola tekstowe (${textFields.length}):\n`;
            textFields.forEach(field => {
                output += `- ${field.key}: ${field.label} (${field.type})\n`;
            });
            
            output += `\nPola obrazów (${imageFields.length}):\n`;
            imageFields.forEach(field => {
                output += `- ${field.key}: ${field.label} (${field.type})\n`;
            });
            
            document.getElementById('debug-output').textContent = output;
        }

        // Auto-load fields on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDynamicFields();
        });
    </script>
</body>
</html>
