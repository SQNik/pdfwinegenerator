<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Karta Wina - 2 kolumny x 5 produktów</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 10pt;
      line-height: 1.4;
      margin: 0;
      padding: 0;
    }

    /* === OKŁADKA - PEŁNA STRONA === */
    .cover-page {
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
      page-break-after: always;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === STRONA PRODUKTÓW - GRID 2 KOLUMNY x 5 WIERSZY === */
    .products-page {
      width: 210mm;
      height: 297mm;
      padding: 6mm 0;
      page-break-after: always;
      display: grid;
      grid-template-columns: 1fr 1fr; /* 2 równe kolumny */
      grid-template-rows: repeat(5, 1fr); /* 5 równych wierszy */
      grid-auto-flow: column; /* 🔥 WYPEŁNIAJ KOLUMNAMI: lewa 1-5, prawa 6-10 */
      gap: 0;
      background-image: url("https://witrynarium.pl/images/okladki/tlo-a4ispad.jpg");
      background-size: contain;
      background-position: top;
    }

    /* === KARTA PRODUKTU - IDEALNIE 1/5 WYSOKOŚCI KOLUMNY === */
    .wine-card {
      display: grid;
      grid-template-columns: 15% 85%; /* 15% obraz, 85% treść */
      gap: 0;
      padding: 6mm;
      border: 1px solid #ddd;
      background: white;
      overflow: hidden;
    }

    /* Lewa strona - Obraz */
    .wine-image {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-right: 4mm;
    }

    .wine-image img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* Prawa strona - Treść */
    .wine-content {
      display: flex;
      flex-direction: column;
      gap: 2mm;
    }

    /* Wiersz nagłówka - Nazwa i Ceny */
    .wine-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4mm;
    }

    .wine-title {
      font-size: 12pt;
      font-weight: 700;
      line-height: 1.2;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      flex: 1;
    }

    .wine-prices {
      display: flex;
      gap: 2mm;
      flex-shrink: 0;
      flex-direction: column;
    }

    .price-badge {
      display: flex;
      align-items: center;
      gap: 2mm;
      font-weight: 600;
      white-space: nowrap;
      justify-content: flex-end;
    }

    .price-amount {
      text-align: right;
      font-size: 10pt;
      color: #1a1a1a;
      border: 2px solid #1a1a1a;
      border-radius: 24px;
      padding: 2px 12px;
    }

    /* Szczegóły wina */
    .wine-details {
      display: flex;
      flex-direction: column;
      gap: 1mm;
    }

    .wine-detail-item {
      display: block;
      font-size: 8pt;
      color: #2c2c2c;
      line-height: 1.3;
    }

    .wine-detail-label {
      font-weight: 600;
      display: inline;
    }

    .wine-detail-value {
      font-weight: 400;
      display: inline;
    }

    .wine-description {
      font-size: 8pt;
      line-height: 1.3;
      color: #2c2c2c;
      max-height: 20mm;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .wine-alcohol {
      font-size: 6pt;
      font-weight: 600;
      color: #2c2c2c;
    }

    /* Wymuszenie nowej strony dla kolejnych grup */
    @media print {
      .products-page {
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <!-- OKŁADKA -->
  <div class="cover-page" style="background-image: url('{{collection.dynamicFieldsByName.zwykly_tekst}}');">
    <!-- Opcjonalnie tytuł kolekcji -->
  </div>

  <!-- STRONY Z PRODUKTAMI - Backend podzieli wina na grupy po 10 -->
  {{#each winePages}}
  <div class="products-page">
    {{#each this}}
    <div class="wine-card">
      <!-- Lewa strona - Obraz -->
      <div class="wine-image">
        <img src="https://witrynarium.pl{{this.image}}" alt="{{this.name}}">
      </div>

      <!-- Prawa strona - Treść -->
      <div class="wine-content">
        <!-- Nagłówek - Nazwa i Ceny -->
        <div class="wine-header-row">
          <h2 class="wine-title">{{this.name}}</h2>
          
          <div class="wine-prices">
            <div class="price-badge">
              <span class="price-amount">{{this.price1}}</span>
            </div>
            <div class="price-badge">
              <span class="price-amount">{{this.price2}}</span>
            </div>
          </div>
        </div>

        <!-- Szczegóły -->
        <div class="wine-details">
          <div class="wine-detail-item">
            <span class="wine-detail-label">Szczep:</span>
            <span class="wine-detail-value">{{this.szczepy}}</span>
          </div>
          
          <div class="wine-detail-item">
            <span class="wine-detail-label">Region:</span>
            <span class="wine-detail-value">{{this.catalogNumber}} {{this.region}}</span>
          </div>
          
          <div class="wine-detail-item">
            <span class="wine-detail-label">Typ:</span>
            <span class="wine-detail-value">{{this.type}}</span>
          </div>

          <div class="wine-detail-item">
            <span class="wine-detail-label">Kolor:</span>
            <span class="wine-detail-value">{{this.category}}</span>
          </div>
          
          <p class="wine-description">{{this.description}}</p>
          
          <div class="wine-alcohol">Vol: {{this.alcohol}}</div>
        </div>
      </div>
    </div>
    {{/each}}
  </div>
  {{/each}}

</body>
</html>
